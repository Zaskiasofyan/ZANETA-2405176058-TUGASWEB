<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Assignment Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ========== ANIMATED BACKGROUND CONTAINER ========== -->
    <div class="background-container">
        <!-- Animated gradient background -->
        <div class="gradient-background"></div>
        
        <!-- Floating particles -->
        <div class="particles-container" id="particlesContainer"></div>
    </div>

    <!-- ========== MAIN CONTENT WRAPPER ========== -->
    <div class="content-wrapper">
        <!-- ========== LOGO AND ACADEMIC INFO SECTION ========== -->
        <div class="logo-section">
            <div class="logos-container">
                <a href="#" class="logo-link" title="University Logo">
                    <img src="logo/images.jpg" alt="University Logo" class="logo-image">
                </a>
                <a href="#" class="logo-link" title="Department Logo">
                    <img src="logo/Unmul.png" alt="Department Logo" class="logo-image">
                </a>
            </div>
            <div class="academic-info">
                <p class="academic-line">Dosen pengampu : Ramaulvi M. Akhyar S.Kom., M.Kom</p>
                <p class="academic-line">Mata kuliah : Pemrograman Web</p>
            </div>
        </div>

        <!-- ========== HEADER SECTION ========== -->
        <header class="header">
            <h1 class="header-title">My Assignment Website</h1>
            <p class="header-subtitle">ZANETA ZASKIAMELIA SOFYAN (2405176058)</p>
        </header>

        <!-- ========== MAIN SECTION ========== -->
        <main class="main-content">
            <div class="cards-container">
                <!-- ========== CARD 1: BLOG ========== -->
                <a href="https://indonesiamenari.netlify.app/" class="card" data-card="blog">
                    <div class="card-content">
                        <div class="card-title">BLOG</div>
                        <div class="card-description">Task 1</div>
                    </div>
                    <div class="card-glow"></div>
                </a>

                <!-- ========== CARD 2: FORM ========== -->
                <a href="https://formgetzaneta.netlify.app/" class="card" data-card="form">
                    <div class="card-content">
                        <div class="card-title">FORM</div>
                        <div class="card-description">Task 2</div>
                    </div>
                    <div class="card-glow"></div>
                </a>

                <!-- ========== CARD 3: PORTFOLIO ========== -->
                <a href="https://portofolio-zanetazaskiameliasofyan.netlify.app/" class="card" data-card="portfolio">
                    <div class="card-content">
                        <div class="card-title">PORTFOLIO</div>
                        <div class="card-description">Task 3</div>
                    </div>
                    <div class="card-glow"></div>
                </a>
            </div>
        </main>

        <!-- ========== FOOTER SECTION ========== -->
        <footer class="footer">
            <p>&copy; 2026 My Website</p>
        </footer>
    </div>

    <!-- ========== SCRIPTS ========== -->
    <script src="script.js"></script>
</body>
</html>
